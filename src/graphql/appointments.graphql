fragment AppointmentFields on appointments {
  id
  doctor_id
  nurse_id
  patient_name
  patient_dob
  doctor_name
  nurse_name
  time_slot_from
  time_slot_to
  state
  meeting_link
  room_id
  room_sid
  additional_note
  soap_note
  soap_note_status
  soap_note_document_id
  soap_note_request_id
  family_mem_name
  is_doctor_in_call
  is_nurse_in_call
  location {
    id
    location_name
    address
  }
  prescriptions {
    prescription_id
    prescription_state
    prescription_request_id
  }
  doctor {
    user {
      display_name
      profile {
        first_name
        last_name
        email
        avatar_url
      }
    }
  }
  nurse {
    user {
      display_name
      profile {
        first_name
        last_name
        email
        avatar_url
      }
    }
  }
}

subscription GetDoctorAppointments(
  $doctor_id: uuid!
  $states: [appointments_state_enum_enum!]
) {
  appointments(
    where: { doctor_id: { _eq: $doctor_id }, state: { _in: $states } }
    order_by: { time_slot_from: asc }
  ) {
    ...AppointmentFields
  }
}

subscription GetNurseAppointments(
  $facility_account_id: uuid!
  $states: [appointments_state_enum_enum!]
) {
  appointments(
    where: {
      facility_account_id: { _eq: $facility_account_id }
      state: { _in: $states }
    }
    order_by: { time_slot_from: asc }
  ) {
    ...AppointmentFields
  }
}

subscription GetAppointmentById($appointment_id: uuid!) {
  appointment: appointments_by_pk(id: $appointment_id) {
    id
    additional_note
    time_slot_to
    time_slot_from
    patient_name
    family_mem_name
    meeting_link
    state
    facility_account_id
    room_id
    room_sid
    is_patient_remote
    doctor_response
    doctor_id
    nurse_id
    doctor_name
    is_nurse_in_call
    is_doctor_in_call
    doctor {
      user {
        profile {
          first_name
          last_name
          address {
            city
            address_lane
            country
            zip_code
          }
          timezone
        }
      }
    }
    nurse {
      user {
        profile {
          first_name
          last_name
          address {
            city
            address_lane
            country
            zip_code
          }
          timezone
        }
      }
    }
    nurse_name
    prescriptions(
      order_by: { updated_at: desc }
      where: { prescription_state: { _eq: "completed" } }
    ) {
      id
      prescription_id
      prescription_state
      updated_at
    }
    soap_note_status
    location {
      location_name
      address
      facility_account {
        facility_name
      }
    }
    patient_vitals {
      blood_pressure
      created_at
      heart_rate
      height
      id
      oximetry
      respiratory_rate
      temperature
      weight
      blood_pressure_diastolic
      blood_pressure_systolic
      images
      notes
    }
    waiting_room {
      id
      status
    }
  }
}

