fragment AppointmentFields on appointments {
  id
  doctor_id
  nurse_id
  patient_name
  patient_dob
  doctor_name
  nurse_name
  time_slot_from
  time_slot_to
  state
  meeting_link
  room_id
  room_sid
  additional_note
  soap_note
  soap_note_status
  soap_note_document_id
  soap_note_request_id
  family_mem_name
  is_doctor_in_call
  is_nurse_in_call
  location {
    id
    location_name
    address
  }
  prescriptions {
    prescription_id
    prescription_state
    prescription_request_id
  }
  doctor {
    user {
      display_name
      profile {
        first_name
        last_name
        email
        avatar_url
      }
    }
  }
  nurse {
    user {
      display_name
      profile {
        first_name
        last_name
        email
        avatar_url
      }
    }
  }
}

subscription GetDoctorAppointments($doctor_id: uuid!, $states: [appointments_state_enum_enum!]) {
  appointments(
    where: { doctor_id: { _eq: $doctor_id }, state: { _in: $states } }
    order_by: { time_slot_from: asc }
  ) {
    ...AppointmentFields
  }
}

subscription GetNurseAppointments($facility_account_id: uuid!, $states: [appointments_state_enum_enum!]) {
  appointments(
    where: { facility_account_id: { _eq: $facility_account_id }, state: { _in: $states } }
    order_by: { time_slot_from: asc }
  ) {
    ...AppointmentFields
  }
}

subscription GetAppointmentById($appointment_id: uuid!) {
  appointments_by_pk(id: $appointment_id) {
    ...AppointmentFields
    patient_vitals {
      id
      appointment_id
      blood_pressure
      blood_pressure_systolic
      blood_pressure_diastolic
      heart_rate
      respiratory_rate
      temperature
      oximetry
      weight
      height
      images
    }
    waiting_room {
      id
      status
    }
  }
}

subscription SubscribeAppointment($appointment_id: uuid!) {
  appointments_by_pk(id: $appointment_id) {
    id
    state
    is_doctor_in_call
    is_nurse_in_call
    room_id
    room_sid
  }
}

mutation UpdateAppointment($appointment_id: uuid!, $set: appointments_set_input!) {
  update_appointments_by_pk(pk_columns: { id: $appointment_id }, _set: $set) {
    id
    state
  }
}

mutation InsertPatientVitals($object: patient_vitals_insert_input!) {
  insert_patient_vitals_one(object: $object) {
    id
  }
}

query GetLocationByNurseId($user_id: uuid!) {
  nurses(where: { user_id: { _eq: $user_id } }) {
    id
    location {
      id
      location_name
    }
  }
}

query GetDoctorsForAppointment($location_id: uuid) {
  doctors(
    where: {
      is_validated: { _neq: REJECTED }
      is_active: { _eq: true }
      _or: [
        { is_public: { _eq: true } }
        { locations: { location_id: { _eq: $location_id } } }
      ]
    }
    order_by: { user: { display_name: asc } }
  ) {
    id
    user {
      display_name
      profile {
        avatar_url
        first_name
        last_name
      }
    }
  }
}

query GetDoctorWeeklyAvailability($doctor_id: uuid) {
  doctor_weekly_availability(where: { doctor_id: { _eq: $doctor_id } }) {
    available_from
    available_till
    day
    doctor_data {
      user {
        profile {
          timezone
        }
      }
    }
  }
}

mutation CreateAppointment($object: NewAppointmentInput!) {
  newAppointment(object: $object) {
    appointment_id
  }
}

mutation GetCallToken($object: GetCallTokenInput!) {
  getCallToken(object: $object) {
    twilio_token
  }
}

mutation LeaveCall($object: LeaveCallInput!) {
  leaveCall(object: $object) {
    appointment_status
    ok
  }
}
